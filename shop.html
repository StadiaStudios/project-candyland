<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Shop - CandySwap</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/x-icon" href="assets/favicon.jpeg">
<style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    :root {
        --neon-pink: #ff00ff;
        --neon-cyan: #00ffff;
        --neon-yellow: #ffff00;
        --neon-green: #39ff14;
        --bg-color: #0a0a0a;
    }

    ::-webkit-scrollbar { width: 12px; }
    ::-webkit-scrollbar-track { background: var(--bg-color); border-left: 2px solid #333; }
    ::-webkit-scrollbar-thumb { background: var(--neon-pink); border: 2px solid var(--bg-color); }
    ::-webkit-scrollbar-thumb:hover { background: var(--neon-cyan); }
    * { scrollbar-width: thin; scrollbar-color: var(--neon-pink) var(--bg-color); }

    body {
        margin: 0;
        padding: 20px;
        background: var(--bg-color);
        color: white;
        font-family: 'Press Start 2P', monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-bottom: 80px;
        min-height: 100vh;
        position: relative;
    }

    body::before {
        content: " ";
        display: block;
        position: fixed;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                    linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 255, 0, 0.06));
        z-index: 999;
        background-size: 100% 3px, 3px 100%;
        pointer-events: none;
    }

    .header {
        width: 100%;
        max-width: 800px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        flex-wrap: wrap;
        gap: 15px;
        
        /* Sticky properties added below */
        position: sticky;
        top: 0;
        z-index: 1000;
        background: var(--bg-color);
        padding: 20px 0 15px 0;
        margin-top: -20px; /* Offset the body padding to stick flush to the top */
    }

    .header-right {
        display: flex;
        gap: 15px;
        align-items: center;
    }

    .back-btn {
        background: transparent;
        border: 3px solid var(--neon-cyan);
        color: var(--neon-cyan);
        padding: 10px 12px;
        text-decoration: none;
        font-size: 10px;
        box-shadow: 4px 4px 0 var(--neon-cyan);
        transition: all 0.1s;
        text-transform: uppercase;
    }

    .back-btn:active {
        box-shadow: 0px 0px 0 var(--neon-cyan);
        transform: translate(4px, 4px);
    }

    .stat-display {
        font-size: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
        background: #000;
        padding: 8px 12px;
        border: 3px solid white;
    }

    .gold-display {
        color: var(--neon-yellow);
        border-color: var(--neon-yellow);
        box-shadow: 4px 4px 0 var(--neon-yellow);
    }

    .level-display {
        color: var(--neon-green);
        border-color: var(--neon-blue);
        box-shadow: 4px 4px 0 var(--neon-green);
    }

    .stat-display img {
        width: 14px;
        height: 14px;
        image-rendering: pixelated;
    }

    .page-title {
        font-size: 24px;
        margin: 20px 0 40px 0;
        color: var(--neon-pink);
        text-shadow: 4px 4px 0 #000, 6px 6px 0 var(--neon-cyan);
        text-align: center;
    }

    .chapter-container {
        width: 100%;
        max-width: 800px;
        margin-bottom: 60px;
    }

    .chapter-header {
        border-bottom: 4px double var(--neon-cyan);
        padding-bottom: 10px;
        margin-bottom: 30px;
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .chapter-number {
        background: var(--neon-pink);
        color: #000;
        padding: 5px 10px;
        font-size: 12px;
    }

    .chapter-name {
        font-size: 18px;
        color: var(--neon-cyan);
        text-transform: uppercase;
    }

    .shop-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 30px;
        width: 100%;
    }

    @media (min-width: 768px) {
        .shop-grid {
            grid-template-columns: 1fr 1fr;
        }
    }

    .island-card {
        background: #000;
        border: 4px solid var(--neon-pink);
        padding: 15px;
        display: flex;
        flex-direction: column;
        gap: 15px;
        transition: 0.1s;
        position: relative;
        box-shadow: 6px 6px 0 var(--neon-cyan);
        scroll-margin: 120px;
    }

    .island-card.active {
        border-color: var(--neon-green);
        box-shadow: 6px 6px 0 var(--neon-yellow);
    }

    .island-card.locked {
        opacity: 0.6;
    }

    .lock-overlay {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.85);
        z-index: 10;
        text-align: center;
        padding: 10px;
    }

    .lock-text {
        font-size: 10px;
        color: var(--neon-pink);
        line-height: 1.6;
    }

    .island-preview {
        width: 100%;
        height: 150px;
        object-fit: cover;
        border: 3px solid #333;
        image-rendering: pixelated;
    }

    .island-info h2 {
        margin: 0 0 10px 0;
        color: var(--neon-cyan);
        font-size: 14px;
        text-transform: uppercase;
    }

    .island-info p {
        margin: 0;
        font-size: 9px;
        color: #aaa;
        line-height: 1.5;
    }

    .buy-btn {
        background: #000;
        border: 3px solid var(--neon-yellow);
        color: var(--neon-yellow);
        padding: 15px;
        font-family: 'Press Start 2P', monospace;
        font-size: 10px;
        cursor: pointer;
        width: 100%;
        box-shadow: 4px 4px 0 var(--neon-yellow);
        transition: all 0.1s;
        text-transform: uppercase;
    }

    .buy-btn:hover:not(:disabled) {
        background: var(--neon-yellow);
        color: #000;
    }

    .buy-btn:active:not(:disabled) {
        box-shadow: 0px 0px 0 var(--neon-yellow);
        transform: translate(4px, 4px);
    }

    .buy-btn:disabled {
        border-color: #444;
        color: #444;
        box-shadow: 4px 4px 0 #222;
        cursor: not-allowed;
    }

    .equip-btn {
        border-color: var(--neon-cyan);
        color: var(--neon-cyan);
        box-shadow: 4px 4px 0 var(--neon-cyan);
    }

    .equip-btn:hover {
        background: var(--neon-cyan) !important;
        color: #000 !important;
    }

    .owned-badge {
        color: var(--neon-green);
        font-size: 10px;
        text-align: center;
        border: 3px solid var(--neon-green);
        padding: 12px;
        box-shadow: 4px 4px 0 var(--neon-green);
    }

    .modal-overlay {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.9);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 2000;
    }

    .modal-box {
        background: #000;
        border: 4px solid var(--neon-pink);
        padding: 30px;
        text-align: center;
        max-width: 400px;
        width: 90%;
        box-shadow: 8px 8px 0 var(--neon-cyan);
    }

    .modal-box p {
        font-size: 12px;
        margin-bottom: 25px;
        line-height: 1.6;
        color: #fff;
    }

    .blink {
        animation: blinker 1s step-end infinite;
    }
    @keyframes blinker {
        50% { opacity: 0; }
    }
</style>
</head>
<body>

<div class="header">
    <a href="index.html" class="back-btn">&lt; BACK</a>
    <div class="header-right">
        <div class="stat-display level-display">
            LVL:<span id="level-val">0</span>
        </div>
        <div class="stat-display gold-display">
            <span id="gold-val">0</span>
            <img src="assets/coin.png" alt="Coins" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSIjRkZGRjAwIj48Y2lyY2xlIGN4PSIxMiIgY3k9IjEyIiByPSIxMCIgc3Ryb2tlPSIjMDAwIiBzdHJva2Utd2lkdGg9IjIiLz48dGV4dCB4PSI5IiB5PSIxNyIgZmlsbD0iIzAwMCIgc3R5bGU9ImZvbnQtc2l6ZTogMTJweDsgZm9udC13ZWlnaHQ6IGJvbGQ7Ij4kPC90ZXh0Pjwvc3ZnPg=='">
        </div>
    </div>
</div>

<h1 class="page-title">LEVELS SELECT</h1>

<div id="shop-container"></div>

<div id="msg-modal" class="modal-overlay">
    <div class="modal-box">
        <p id="msg-text"></p>
        <button class="buy-btn" onclick="closeModal()">CLOSE</button>
    </div>
</div>

<script>
    const buySfx = new Audio('assets/sfx/buy.mp3');
    const equipSfx = new Audio('assets/sfx/select.mp3');

    const chapters = [
        {
            number: 1,
            title: "Classic Valley",
            islands: [
                { id: 'default', name: 'Classic Valley', price: 0, desc: 'The original 8-bit experience.', image: 'assets/bg/1.png' },
                { id: 'xmas_2025', name: 'Xmas 2025', price: 3500, desc: 'Festive winter mission.', image: 'assets/bg/xmas_2025.png' },
                { id: 'chocolate-meteor', name: 'Choco Meteor', price: 5000, desc: 'Floating cocoa anomalies.', image: 'assets/bg/2.png' },
                { id: 'frozen-valley', name: 'Frozen Valley', price: 8000, desc: 'Frozen World', image: 'assets/bg/frozen-valley.png' },
                { id: 'fire-dungeon', name: 'Fire Dungeon', price: 9500, desc: 'Maximum heat challenge.', image: 'assets/bg/fire-dungeon.png' }
            ]
        },
        {
            number: 2,
            title: "Film City",
            islands: [
                { id: 'bikini-bottom', name: 'Bikini Bottom', price: 12000, desc: 'Deep sea candy hunt.', image: 'assets/bg/bikini-bottom.jpg' },
                { id: 'magic-city-wizard101', name: 'Wizards101: Magic City', price: 25000, desc: 'Wizard101 Arcane Adventure.', image: 'assets/bg/magic-city.jpg' },
                { id: 'fizz-city', name: 'Fizz City', price: 30000, desc: 'The Ultimate fizz soda experience', image: 'assets/bg/fizz-city.jpg' }
            ]
        },
        {
            number: 3,
            title: "Coming Soon",
            islands: [
                { id: 'ComingSoon', name: 'Coming Soon', price: 99999999999999999999, desc: 'Coming Soon', image: 'assets/titleimg.png' }
            ]
        }
    ];

    let gold = parseInt(localStorage.getItem('candySwap_gold')) || 0;
    let owned = JSON.parse(localStorage.getItem('candySwap_owned')) || ['default'];
    let active = localStorage.getItem('candySwap_activeIsland') || 'default';

    function updateHeaderStats() {
        document.getElementById('gold-val').innerText = gold.toLocaleString();
        document.getElementById('level-val').innerText = owned.length;
    }

    function showMessage(msg) {
        document.getElementById('msg-text').innerText = msg;
        document.getElementById('msg-modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('msg-modal').style.display = 'none';
    }

    function render(shouldScroll = false) {
        const container = document.getElementById('shop-container');
        container.innerHTML = '';

        chapters.forEach((chapter, index) => {
            let isChapterUnlocked = true;
            if (index > 0) {
                const prevChapter = chapters[index - 1];
                isChapterUnlocked = prevChapter.islands.every(isl => owned.includes(isl.id));
            }

            const chapterDiv = document.createElement('div');
            chapterDiv.className = 'chapter-container';
            
            chapterDiv.innerHTML = `
                <div class="chapter-header">
                    <span class="chapter-number">CH ${chapter.number}</span>
                    <span class="chapter-name">${chapter.title}</span>
                </div>
                <div class="shop-grid"></div>
            `;

            const grid = chapterDiv.querySelector('.shop-grid');

            chapter.islands.forEach((island) => {
                const isOwned = owned.includes(island.id);
                const isActive = active === island.id;
                
                const card = document.createElement('div');
                card.id = `island-${island.id}`;
                card.className = `island-card ${isActive ? 'active' : ''} ${!isChapterUnlocked ? 'locked' : ''}`;
                
                if (!isChapterUnlocked) {
                    card.innerHTML = `
                        <div class="lock-overlay">
                            <div class="lock-text">CHAPTER LOCKED<br><br>BUY ALL STAGES IN<br>CH ${chapter.number - 1} TO UNLOCK</div>
                        </div>
                        <img src="${island.image}" class="island-preview" style="filter: blur(8px) grayscale(1);">
                        <div class="island-info">
                            <h2>??????</h2>
                            <p>Complete previous chapter</p>
                        </div>
                        <button class="buy-btn" disabled>LOCKED</button>
                    `;
                } else {
                    card.innerHTML = `
                        <img src="${island.image}" class="island-preview" alt="${island.name}" onerror="this.style.background='#222'">
                        <div class="island-info">
                            <h2>${island.name}</h2>
                            <p>${island.desc}</p>
                        </div>
                        ${isOwned 
                            ? (isActive ? '<div class="owned-badge blink">EQUIPPED</div>' : `<button class="buy-btn equip-btn" onclick="selectIsland('${island.id}')">USE STAGE</button>`)
                            : `<button class="buy-btn" onclick="buy('${island.id}', ${island.price})">BUY [${island.price}]</button>`
                        }
                    `;
                }
                grid.appendChild(card);
            });

            container.appendChild(chapterDiv);
        });

        if (shouldScroll) {
            setTimeout(() => {
                const activeCard = document.getElementById(`island-${active}`);
                if (activeCard) {
                    activeCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 100);
        }
    }

    window.buy = (id, price) => {
        if (gold >= price) {
            gold -= price;
            owned.push(id);
            localStorage.setItem('candySwap_gold', gold);
            localStorage.setItem('candySwap_owned', JSON.stringify(owned));
            updateHeaderStats();
            buySfx.currentTime = 0;
            buySfx.play().catch(() => {});
            selectIsland(id, false); 
        } else {
            showMessage("INSUFFICIENT GOLD!");
        }
    };

    window.selectIsland = (id, playSound = true) => {
        active = id;
        localStorage.setItem('candySwap_activeIsland', id);
        if(playSound) {
            equipSfx.currentTime = 0;
            equipSfx.play().catch(() => {});
        }
        render(false);
    };

    updateHeaderStats();
    render(true);
</script>
</body>
</html>
