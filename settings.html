<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Settings - CandySwap</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/x-icon" href="assets/favicon.jpeg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --neon-pink: #ff00ff;
            --neon-cyan: #00ffff;
            --neon-yellow: #ffff00;
            --neon-green: #39ff14;
            --bg-color: #0a0a0a;
        }

        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); border-left: 2px solid #333; }
        ::-webkit-scrollbar-thumb { background: var(--neon-pink); border: 2px solid var(--bg-color); }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-cyan); }
        * { scrollbar-width: thin; scrollbar-color: var(--neon-pink) var(--bg-color); }

        body {
            margin: 0;
            padding: 20px;
            background: var(--bg-color);
            color: white;
            font-family: 'Press Start 2P', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100dvh;
            overflow-y: auto;
            position: relative;
        }

        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 999;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        .header {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            flex-shrink: 0;
            margin-top: 20px;
        }

        .back-btn {
            background: transparent;
            border: 3px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 10px 12px;
            text-decoration: none;
            font-size: 10px;
            box-shadow: 4px 4px 0 var(--neon-cyan);
            transition: all 0.1s;
            text-transform: uppercase;
        }

        .back-btn:active {
            box-shadow: 0px 0px 0 var(--neon-cyan);
            transform: translate(4px, 4px);
        }

        h1 {
            margin: 0;
            font-size: 18px;
            color: var(--neon-yellow);
            text-shadow: 3px 3px 0 #ff0055;
            text-transform: uppercase;
            text-align: center;
            line-height: 1.4;
        }

        .settings-container {
            width: 100%;
            max-width: 500px;
            background: #000;
            border: 4px solid var(--neon-pink);
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 6px 6px 0px var(--neon-cyan);
            box-sizing: border-box;
        }

        .section-title {
            font-size: 12px;
            color: var(--neon-cyan);
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 4px dashed var(--neon-pink);
            padding-bottom: 10px;
            text-shadow: 2px 2px 0 #000;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 2px solid #333;
        }

        .setting-item:last-child {
            border-bottom: none;
        }

        .label {
            color: #aaa;
            font-size: 10px;
            line-height: 1.4;
        }

        .value {
            font-size: 12px;
            color: #fff;
            text-align: right;
        }

        .link-item {
            color: var(--neon-green);
            text-decoration: none;
            font-size: 10px;
            border-bottom: 2px solid transparent;
            transition: border-bottom 0.2s;
        }

        .link-item:hover {
            border-bottom: 2px solid var(--neon-green);
        }

        .data-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 10px 0;
        }

        .action-btn {
            background: #000;
            border: 3px solid var(--neon-yellow);
            color: var(--neon-yellow);
            padding: 15px 10px;
            font-family: 'Press Start 2P', monospace;
            font-size: 9px;
            cursor: pointer;
            box-shadow: 4px 4px 0 var(--neon-yellow);
            transition: all 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            line-height: 1.4;
        }

        .action-btn:active {
            box-shadow: 0px 0px 0 var(--neon-yellow);
            transform: translate(4px, 4px);
            background: var(--neon-yellow);
            color: #000;
        }

        .btn-icon {
            font-size: 16px;
        }

        #import-input {
            display: none;
        }

        .footer-note {
            margin-top: auto;
            font-size: 10px;
            color: var(--neon-pink);
            text-align: center;
            padding-bottom: 20px;
            flex-shrink: 0;
            line-height: 1.5;
        }

        .blink {
            animation: blinker 1s step-end infinite;
        }
        @keyframes blinker {
            50% { opacity: 0; }
        }

        #toast {
            position: fixed;
            bottom: 30px;
            background: #000;
            color: var(--neon-green);
            padding: 15px 20px;
            font-size: 10px;
            border: 4px solid var(--neon-green);
            box-shadow: 5px 5px 0 var(--neon-green);
            transform: translateY(150px);
            transition: transform 0.2s steps(4);
            z-index: 1000;
            text-align: center;
            line-height: 1.5;
        }
        #toast.show { transform: translateY(0); }

        @media (max-width: 400px) {
            .setting-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .value {
                text-align: left;
            }
            .data-actions {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn">&lt; BACK</a>
        <h1>SETTINGS</h1>
        <div style="width: 76px;"></div>
    </div>

    <div class="settings-container">
        <div class="section-title">PLAYER STATS</div>
        <div class="setting-item">
            <span class="label">LEVEL</span>
            <span class="value" id="level-display">0</span>
        </div>
        <div class="setting-item">
            <span class="label">VERSION</span>
            <span class="value" id="version-display">V1.4.6</span>
        </div>
    </div>

    <div class="settings-container">
        <div class="section-title">NETWORK</div>
        <div class="setting-item">
            <span class="label">STADIASTUDIOS</span>
            <a href="https://stadiastudios.github.io/stadia/" target="_blank" class="link-item">OPEN_&gt;</a>
        </div>
        <div class="setting-item">
            <span class="label">CHANGELOG</span>
            <a href="changelog.txt" target="_blank" class="link-item">READ_&gt;</a>
        </div>
    </div>

    <div class="settings-container">
        <div class="section-title">MEMORY CARD</div>
        <div class="data-actions">
            <button class="action-btn" onclick="exportData()">
                <span class="btn-icon">▼</span>
                SAVE DATA
            </button>
            <button class="action-btn" onclick="triggerImport()">
                <span class="btn-icon">▲</span>
                LOAD DATA
            </button>
        </div>
        <input type="file" id="import-input" accept=".json" onchange="importData(event)">
    </div>

    <div class="footer-note blink">
        INSERT COIN TO CONTINUE<br><br>
        <span style="color: #666; font-size: 8px;">PROGRESS SAVED LOCALLY</span>
    </div>

    <div id="toast">PROGRESS SAVED!</div>

    <script>
        const STORAGE_KEYS = {
            gold: 'candySwap_gold',
            owned: 'candySwap_owned',
            active: 'candySwap_activeIsland'
        };

        function updateStats() {
            try {
                const owned = JSON.parse(localStorage.getItem(STORAGE_KEYS.owned)) || ['default'];
                document.getElementById('level-display').innerText = owned.length;
            } catch (e) {
                document.getElementById('level-display').innerText = '1';
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function exportData() {
            const data = {
                gold: localStorage.getItem(STORAGE_KEYS.gold),
                owned: localStorage.getItem(STORAGE_KEYS.owned),
                active: localStorage.getItem(STORAGE_KEYS.active),
                exportDate: new Date().toISOString()
            };

            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `CandySwap_Save_${new Date().toLocaleDateString().replace(/\//g, '-')}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast("BACKUP SAVED!");
        }

        function triggerImport() {
            document.getElementById('import-input').click();
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    if (data.gold !== undefined || data.owned !== undefined) {
                        if (data.gold) localStorage.setItem(STORAGE_KEYS.gold, data.gold);
                        if (data.owned) localStorage.setItem(STORAGE_KEYS.owned, data.owned);
                        if (data.active) localStorage.setItem(STORAGE_KEYS.active, data.active);
                        
                        updateStats();
                        showToast("DATA LOADED!");
                    } else {
                        showToast("FILE CORRUPT!");
                    }
                } catch (err) {
                    showToast("ERROR READING!");
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        updateStats();
    </script>
</body>
</html>
